<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0d1726" />
  <link rel="icon" href="/assets/branding/favicon.ico?v=20260329b" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/branding/favicon-32x32.png?v=20260329b" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/branding/favicon-16x16.png?v=20260329b" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/branding/apple-touch-icon.png?v=20260329b" />
  <link rel="manifest" href="/site.webmanifest" />
  <title>Page Not Found | KestrelNebula Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Sans+3:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #09111a;
      --text: #eff5fb;
      --muted: #a5b3c3;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #f3b85a;
      --focus: #7fc8ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      font-family: "Source Sans 3", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(243, 184, 90, 0.12), transparent 34%),
        linear-gradient(180deg, #09111a 0%, #0d1726 55%, #101d2f 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    a:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 4px;
    }

    .panel {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 2rem;
      background: rgba(19, 36, 58, 0.9);
    }

    .logo-mark {
      width: 4rem;
      height: 4rem;
      display: block;
      margin-bottom: 1.25rem;
      border-radius: 1.1rem;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.22);
    }

    .logo-mark img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    h1 {
      margin: 0 0 1rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 1.25rem;
      color: var(--muted);
      font-size: 1.08rem;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 3rem;
      padding: 0.8rem 1.1rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      font-weight: 700;
    }

    .button.primary {
      background: var(--accent);
      color: #09111a;
      border-color: transparent;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }

      .panel {
        padding: 1.4rem;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <span class="logo-mark" aria-hidden="true">
      <img src="/assets/branding/logo-mark.png" alt="" width="64" height="64" />
    </span>
    <h1>Page not found</h1>
    <p>
      The page you requested does not exist. Use the links below to return to the developer website
      or open the public privacy page.
    </p>
    <div class="actions">
      <a class="button primary" href="/">Back to homepage</a>
      <a class="button" href="/privacy.html">Privacy policy</a>
    </div>
  </main>
</body>
</html>
